name: X Auto Post

on:
  repository_dispatch:
    types: [x-post]       # cron-job.org → GitHub API → ここ
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = JST 09:00 (午前) ※バックアップ
    - cron: '0 9 * * *'   # UTC 09:00 = JST 18:00 (午後) ※バックアップ
  workflow_dispatch:
    inputs:
      slot:
        description: '午前 or 午後'
        required: true
        type: choice
        options: ['午前', '午後']

concurrency:
  group: x-auto-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Determine slot
        id: slot
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SLOT: ${{ inputs.slot }}
          SCHEDULE_EXPR: ${{ github.event.schedule }}
          DISPATCH_SLOT: ${{ github.event.client_payload.slot }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=$INPUT_SLOT" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "repository_dispatch" ]; then
            echo "value=${DISPATCH_SLOT:-午前}" >> "$GITHUB_OUTPUT"
          elif [ "$SCHEDULE_EXPR" = "0 0 * * *" ]; then
            echo "value=午前" >> "$GITHUB_OUTPUT"
          else
            echo "value=午後" >> "$GITHUB_OUTPUT"
          fi

      - name: Run X auto post
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET_KEY: ${{ secrets.X_API_SECRET_KEY }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          POST_SLOT: ${{ steps.slot.outputs.value }}
        run: node scripts/x-auto-post.mjs "$POST_SLOT"

      - name: Commit & push draft updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/x-drafts.md
          git diff --cached --quiet || git commit -m "mark X post as done [skip ci]"
          git push
