<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }
  .card {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(165deg, #0f1724 0%, #162033 50%, #1a2844 100%);
    padding: 80px 64px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Decorative background circles */
  .card::before {
    content: '';
    position: absolute;
    top: -120px;
    right: -120px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(232, 121, 87, 0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: 200px;
    left: -100px;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(232, 121, 87, 0.05) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* Category label */
  .category {
    font-size: 22px;
    color: #E87957;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  /* Title */
  .title {
    font-size: 56px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.4;
    letter-spacing: 2px;
    margin-bottom: 32px;
    flex-shrink: 0;
  }

  /* Criteria tags */
  .criteria {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 48px;
  }
  .criteria-tag {
    background: rgba(232, 121, 87, 0.15);
    color: #E8A080;
    font-size: 20px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 24px;
    letter-spacing: 0.5px;
    border: 1px solid rgba(232, 121, 87, 0.2);
  }

  /* Divider */
  .divider {
    width: 80px;
    height: 3px;
    background: #E87957;
    margin-bottom: 48px;
  }

  /* Spacer */
  .spacer {
    flex: 1;
  }

  /* Character section */
  .character-section {
    display: flex;
    align-items: flex-end;
    gap: 32px;
    position: relative;
    z-index: 1;
  }
  .character-img {
    width: 200px;
    height: 200px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .character-text {
    font-size: 22px;
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  /* Bottom accent bar */
  .accent-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #E87957 0%, rgba(232, 121, 87, 0.3) 100%);
  }

  /* Brand */
  .brand {
    position: absolute;
    bottom: 32px;
    right: 64px;
    font-size: 24px;
    color: rgba(232, 121, 87, 0.5);
    font-weight: 700;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="category">{{CATEGORY}}</div>
    <div class="title">{{TITLE}}</div>
    <div class="criteria">
      <span class="criteria-tag">{{TAG1}}</span>
      <span class="criteria-tag">{{TAG2}}</span>
      <span class="criteria-tag">{{TAG3}}</span>
      <span class="criteria-tag">{{TAG4}}</span>
    </div>
    <div class="divider"></div>
    <div class="spacer"></div>
    <div class="character-section">
      <img class="character-img" src="../public/saunako/guide.webp" alt="サウナ子">
      <div class="character-text">サウナ子が厳選したよ!</div>
    </div>
    <div class="accent-bar"></div>
    <div class="brand">saunako.jp</div>
  </div>
</body>
</html>
