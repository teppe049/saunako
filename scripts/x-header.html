<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
  }
  .banner {
    width: 1500px;
    height: 500px;
    background: linear-gradient(100deg, #121a2e 0%, #16213e 40%, #1a3055 70%, #1f3a65 100%);
    position: relative;
    display: flex;
    align-items: center;
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }

  /* Decorative circles */
  .circle-1 {
    position: absolute;
    top: -120px;
    right: 250px;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: rgba(232, 121, 87, 0.10);
  }
  .circle-2 {
    position: absolute;
    bottom: -100px;
    left: 300px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: rgba(232, 121, 87, 0.06);
  }
  .circle-3 {
    position: absolute;
    top: 30px;
    left: 700px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.03);
  }

  /* Steam particles */
  .steam {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.035);
  }
  .steam-1 { width: 50px; height: 50px; top: 60px; left: 450px; }
  .steam-2 { width: 35px; height: 35px; top: 200px; left: 650px; }
  .steam-3 { width: 45px; height: 45px; bottom: 100px; left: 550px; }
  .steam-4 { width: 30px; height: 30px; top: 100px; right: 450px; }
  .steam-5 { width: 25px; height: 25px; top: 300px; left: 400px; }

  /* Center-left: text content (shifted right to avoid icon overlap zone) */
  .text-area {
    position: absolute;
    left: 280px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .catchphrase {
    font-size: 56px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.35;
    letter-spacing: 3px;
  }
  .catchphrase .accent {
    color: #E87957;
  }
  .url {
    font-size: 18px;
    color: rgba(232, 121, 87, 0.65);
    font-weight: 600;
    letter-spacing: 3px;
    margin-top: 4px;
  }

  /* Right: character (large) */
  .character-area {
    position: absolute;
    right: 40px;
    bottom: 0;
    z-index: 2;
  }
  .character-glow {
    position: absolute;
    width: 450px;
    height: 450px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -45%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232, 121, 87, 0.12) 0%, transparent 65%);
    z-index: -1;
  }
  .character-area img {
    height: 500px;
    object-fit: contain;
    filter: drop-shadow(0 4px 24px rgba(0, 0, 0, 0.35));
  }

  /* Bottom accent bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent 0%, #E87957 30%, #D4634A 70%, transparent 100%);
    z-index: 3;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="circle-1"></div>
    <div class="circle-2"></div>
    <div class="circle-3"></div>
    <div class="steam steam-1"></div>
    <div class="steam steam-2"></div>
    <div class="steam steam-3"></div>
    <div class="steam steam-4"></div>
    <div class="steam steam-5"></div>

    <div class="text-area">
      <div class="catchphrase">
        あなたの<span class="accent">「整い」</span>を、<br>私が見つける
      </div>
      <div class="url">saunako.jp</div>
    </div>

    <div class="character-area">
      <div class="character-glow"></div>
      <img src="guide-transparent.png" alt="サウナ子">
    </div>

    <div class="bottom-bar"></div>
  </div>
</body>
</html>
